name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: |
          npm ci
          npm run build
          npm run lint
          npm test
      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag btms-portal-frontend .
          exit $?
      - name: Check with Trivy
        run: |
          docker run -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/.trivyignore.yaml:/work/.trivyignore.yaml \
            aquasec/trivy:0.69.3 image \
            --ignore-unfixed \
            --ignorefile /work/.trivyignore.yaml \
            --exit-code 1 \
            btms-portal-frontend:latest
      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
